<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FFDF73" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Crown motif -->
  <path d="M 40 120 L 20 60 L 80 90 L 100 30 L 120 90 L 180 60 L 160 120 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.4"/>
  <path d="M 50 140 L 150 140 L 140 150 L 60 150 Z" fill="url(#gold)" opacity="0.6"/>
  <!-- The Alpha -->
  <text x="100" y="130" font-family="'Cinzel', serif" font-size="90" fill="url(#gold)" text-anchor="middle" font-weight="bold" filter="url(#glow)">α</text>
  <!-- Sacred Geometry rings -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gold)" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
</svg>